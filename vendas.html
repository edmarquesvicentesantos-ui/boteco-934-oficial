<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - Vendas</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = { /* MESMA CONFIG DO INDEX */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'vendas'), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            let total = 0;
            snapshot.forEach(item => {
                const v = item.val();
                total += v.preco;
                lista.innerHTML += `<tr><td>${v.data}</td><td>${v.produto}</td><td>R$ ${v.preco.toFixed(2)}</td></tr>`;
            });
            document.getElementById('total').innerText = total.toFixed(2);
        });
    </script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #333; color: white; }
        .resumo { font-size: 1.5em; font-weight: bold; color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html">⬅ Voltar</a>
    <h1>Histórico de Vendas</h1>
    <div class="resumo">Total em Caixa: R$ <span id="total">0.00</span></div>
    <table>
        <thead><tr><th>Data</th><th>Produto</th><th>Valor</th></tr></thead>
        <tbody id="lista"></tbody>
    </table>
</body>
</html>
