<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Vendas - Boteco 934</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = { /* USE A MESMA CONFIGURAÇÃO ACIMA */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const listaVendas = document.getElementById('listaVendas');
        onValue(ref(db, 'vendas'), (snapshot) => {
            listaVendas.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const venda = childSnapshot.val();
                listaVendas.innerHTML += `<li>${venda.data} - ${venda.produto}: R$ ${venda.preco.toFixed(2)}</li>`;
            });
        });
    </script>
</head>
<body>
    <h1>Vendas Realizadas</h1>
    <ul id="listaVendas"></ul>
    <a href="index.html">Voltar ao PDV</a>
</body>
</html>
