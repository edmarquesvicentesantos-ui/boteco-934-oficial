<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA BOTECO 934</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Topo do Sistema */
        header {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
        }

        .conteudo {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 100px; /* Espaço para não cobrir o botão pela rádio */
        }

        /* Campo do Leitor */
        .campo-busca {
            margin-bottom: 20px;
        }

        input#barcode {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        /* Card de Produto */
        .produto-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Cupom e Total */
        .painel-venda {
            background: #fff;
            border: 2px dashed #bbb;
            padding: 20px;
            border-radius: 10px;
        }

        .total {
            text-align: right;
            font-size: 2em;
            color: #d9534f;
            font-weight: bold;
            margin: 15px 0;
        }

        .btn-fechar {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        /* BARRA DA RÁDIO (CORTINA) */
        .radio-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1a1a1a;
            border-top: 3px solid #007bff;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10000;
        }

        select#estilo-musical {
            background: #333;
            color: #007bff;
            border: 1px solid #007bff;
            padding: 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        audio {
            height: 35px;
            filter: invert(1); /* Deixa o player claro para o fundo escuro */
        }
    </style>
</head>
<body>

    <header>SISTEMA DE VENDAS - BOTECO 934</header>

    <div class="conteudo">
        <div class="campo-busca">
            <input type="text" id="barcode" placeholder="Escaneie o código de barras aqui..." autofocus>
        </div>

        <div class="produto-card">
            <div>
                <strong>Cerveja Gelada (600ml)</strong><br>
                <span>R$ 12,00</span>
            </div>
            <button class="btn-add">ADICIONAR</button>
        </div>

        <div class="painel-venda">
            <h3>Cupom de Venda</h3>
            <div id="lista-itens">
                </div>
            <div class="total">TOTAL: R$ 0,00</div>
            <button class="btn-fechar">FECHAR VENDA E LANÇAR</button>
        </div>
    </div>

    <div class="radio-bar">
        <label style="color: white; font-size: 12px; font-weight: bold;">📻 ESTILO:</label>
        <select id="estilo-musical" onchange="mudarRadio()">
            <option value="https://antenaone.crossradio.com.br/stream/1/">🎸 Rock / Pop (Internacional)</option>
            <option value="https://servidor39.brlogic.com:8300/live">🤠 Sertanejo (Modão)</option>
            <option value="https://shaincast.com.br:7052/stream">🕺 Flashback (80s / 90s)</option>
            <option value="https://01.mgradio.com.br/8004/stream">🔊 Dance Mix</option>
        </select>

        <audio id="player-audio" controls>
            <source id="radio-src" src="https://antenaone.crossradio.com.br/stream/1/" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Função para trocar a rádio
        function mudarRadio() {
            var select = document.getElementById('estilo-musical');
            var audio = document.getElementById('player-audio');
            var source = document.getElementById('radio-src');

            source.src = select.value;
            audio.load();
            audio.play(); 
        }

        // Focar no leitor sempre que abrir
        window.onload = function() {
            document.getElementById('barcode').focus();
        };
    </script>

</body>
</html>
