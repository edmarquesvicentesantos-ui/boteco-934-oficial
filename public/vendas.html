<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Boteco 934</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Topo com Botão Home */
        header {
            background-color: #1a1a1a;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-home {
            background-color: #444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-home:hover { background-color: #555; }

        /* Corpo Principal Lado a Lado */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding-bottom: 60px; /* Espaço da rádio */
        }

        /* Lado Esquerdo: Produtos e Busca */
        .coluna-vendas {
            flex: 2;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #ddd;
        }

        /* Lado Direito: Cupom */
        .coluna-cupom {
            flex: 1;
            background-color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }

        input#barcode {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #007bff;
            border-radius: 8px;
            font-size: 16px;
        }

        .produto-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        .lista-cupom {
            flex: 1;
            border: 1px dashed #ccc;
            margin: 10px 0;
            padding: 10px;
            font-family: monospace;
            overflow-y: auto;
            background: #fafafa;
        }

        .total-container {
            font-size: 24px;
            font-weight: bold;
            color: #d9534f;
            text-align: right;
            margin-bottom: 15px;
        }

        .btn-fechar {
            background-color: #28a745;
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Barra da Rádio */
        .radio-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1a1a1a;
            border-top: 3px solid #007bff;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 1000;
        }

        audio { height: 30px; filter: invert(1); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-home">🏠 HOME</a>
        <span>BOTECO 934 - PDV</span>
        <div style="width: 80px;"></div> </header>

    <div class="main-layout">
        <div class="coluna-vendas">
            <input type="text" id="barcode" placeholder="Bipe o produto ou digite..." autofocus>
            
            <div class="produto-card">
                <div>
                    <strong>Cerveja Gelada (600ml)</strong><br>
                    <span>R$ 12,00</span>
                </div>
                <button style="background:#007bff; color:white; border:none; padding:10px; border-radius:5px;">ADD</button>
            </div>
            </div>

        <div class="coluna-cupom">
            <h3 style="margin-top:0;">🛒 Cupom Atual</h3>
            <div class="lista-cupom" id="itens">
                <div style="display:flex; justify-content:space-between;">
                    <span>1x Cerveja 600ml</span>
                    <span>12,00</span>
                </div>
            </div>
            <div class="total-container">
                TOTAL: R$ 12,00
            </div>
            <button class="btn-fechar">FINALIZAR (F2)</button>
        </div>
    </div>

    <div class="radio-bar">
        <select id="estilo" onchange="mudarRadio()" style="background:#333; color:white; border:1px solid #007bff; padding:5px; border-radius:5px;">
            <option value="https://antenaone.crossradio.com.br/stream/1/">🎸 Rock / Pop</option>
            <option value="https://servidor39.brlogic.com:8300/live">🤠 Sertanejo</option>
            <option value="https://shaincast.com.br:7052/stream">🕺 Flashback</option>
        </select>
        <audio id="player" controls>
            <source id="src" src="https://antenaone.crossradio.com.br/stream/1/" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function mudarRadio() {
            var s = document.getElementById('estilo');
            var a = document.getElementById('player');
            var r = document.getElementById('src');
            r.src = s.value;
            a.load();
            a.play();
        }
        window.onload = () => document.getElementById('barcode').focus();
    </script>
</body>
</html>
