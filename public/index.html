<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV</title>
    <script type="module">
        // Configuração do Firebase do Boteco 934
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs-lO0zXpU8M1F-h9Q8G5uV5uV5uV5uV5", 
            authDomain: "boteco-934-77649.firebaseapp.com",
            databaseURL: "https://boteco-934-77649-default-rtdb.firebaseio.com",
            projectId: "boteco-934-77649",
            storageBucket: "boteco-934-77649.appspot.com",
            messagingSenderId: "367396165507",
            appId: "1:367396165507:web:865666f7f2b60486c07525"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Função para salvar venda
        window.salvarVenda = function(produto, valor) {
            const vendasRef = ref(db, 'vendas');
            const novaVendaRef = push(vendasRef);
            set(novaVendaRef, {
                item: produto,
                preco: valor,
                data: new Date().toLocaleString()
            }).then(() => {
                alert("Venda registrada no Boteco 934!");
            }).catch((error) => {
                console.error("Erro ao salvar:", error);
            });
        }
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        .btn { padding: 20px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; }
        .cerveja { background: #f1c40f; color: #000; }
        .petisco { background: #e67e22; color: #fff; }
    </style>
</head>
<body>
    <h1>🍻 BOTECO 934</h1>
    <p>Clique no produto para registrar a venda:</p>
    
    <button class="btn cerveja" onclick="salvarVenda('Cerveja 600ml', 12.00)">Cerveja 600ml - R$ 12,00</button>
    <button class="btn petisco" onclick="salvarVenda('Porção Batata', 25.00)">Porção Batata - R$ 25,00</button>

    <hr>
    <p>Os dados aparecerão no seu Firebase Realtime Database.</p>
</body>
</html>
