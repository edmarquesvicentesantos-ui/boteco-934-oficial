<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Boteco 934</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .login-card { background: #222; padding: 30px; border-radius: 15px; border: 2px solid #ffc107; text-align: center; width: 300px; }
        h2 { color: #ffc107; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; font-size: 18px; text-align: center; }
        button { width: 100%; padding: 12px; background: #ffc107; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #e0a800; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🍺 Boteco 934</h2>
    <p>Acesse o Sistema</p>
    <input type="password" id="senha" placeholder="Digite a Senha">
    <button onclick="entrar()">ENTRAR</button>
</div>

<script>
    function entrar() {
        const senhaDigitada = document.getElementById('senha').value;
        // DEFINI A SENHA ABAIXO COMO 1234
        if (senhaDigitada === '1234') {
            window.location.href = "vendas.html";
        } else {
            alert("Senha Incorreta! Tente 1234");
        }
    }
    
    // Permite entrar apertando a tecla ENTER
    document.getElementById('senha').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { entrar(); }
    });
</script>

</body>
</html>
