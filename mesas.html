<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Mesas</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "COLE_SUA_CHAVE_AQUI", 
            authDomain: "boteco-934.firebaseapp.com",
            databaseURL: "https://boteco-934-default-rtdb.firebaseio.com",
            projectId: "boteco-934"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'mesas_ativas/'), (snapshot) => {
            const ocupadas = snapshot.val() || {};
            for (let i = 1; i <= 10; i++) {
                const nome = "Mesa " + i;
                const btn = document.getElementById('m' + i);
                if (ocupadas[nome]) {
                    btn.style.background = "red";
                    btn.innerHTML = nome + "<br>OCUPADA";
                    btn.onclick = () => alert("Mesa ocupada!");
                } else {
                    btn.style.background = "green";
                    btn.innerHTML = nome + "<br>LIVRE";
                    btn.onclick = () => { location.href = 'index.html'; };
                }
            }
        });
    </script>
    <style>
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .mesa { padding: 30px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Mapa de Mesas - Boteco 934</h1>
    <div class="grid">
        <button id="m1" class="mesa">Mesa 1</button>
        <button id="m2" class="mesa">Mesa 2</button>
        <button id="m3" class="mesa">Mesa 3</button>
        <button id="m4" class="mesa">Mesa 4</button>
        <button id="m5" class="mesa">Mesa 5</button>
        <button id="m6" class="mesa">Mesa 6</button>
        <button id="m7" class="mesa">Mesa 7</button>
        <button id="m8" class="mesa">Mesa 8</button>
        <button id="m9" class="mesa">Mesa 9</button>
        <button id="m10" class="mesa">Mesa 10</button>
    </div>
</body>
</html>
