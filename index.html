<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - PDV Ativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "boteco-934.firebaseapp.com",
            databaseURL: "https://boteco-934-default-rtdb.firebaseio.com",
            projectId: "boteco-934",
            storageBucket: "boteco-934.appspot.com",
            messagingSenderId: "107123456789",
            appId: "1:107123456789:web:id_do_app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let totalVenda = 0;
        let itensComanda = [];

        // Adiciona o produto na lista visual da direita
        window.adicionarItem = function(nome, preco) {
            itensComanda.push({nome, preco});
            totalVenda += preco;
            
            const lista = document.getElementById('lista-itens');
            const itemHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px;">
                                <span>${nome}</span> <span>R$ ${preco.toFixed(2)}</span>
                              </div>`;
            lista.innerHTML += itemHTML;
            document.getElementById('resumo-total').innerText = "R$ " + totalVenda.toFixed(2);
        };

        // Envia a venda para o Banco de Dados
        window.finalizarVenda = function(metodo) {
            if (totalVenda === 0) return alert("Adicione produtos primeiro!");

            const vendasRef = ref(db, 'vendas');
            const novaVenda = push(vendasRef);
            
            set(novaVenda, {
                total: totalVenda,
                metodo: metodo,
                data: new Date().toLocaleString('pt-BR'),
                produtos: itensComanda
            }).then(() => {
                alert("✅ Venda no " + metodo + " registrada!");
                limparTudo();
            });
        };

        window.limparTudo = function() {
            totalVenda = 0;
            itensComanda = [];
            document.getElementById('lista-itens').innerHTML = "";
            document.getElementById('resumo-total').innerText = "R$ 0,00";
        };
    </script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #d32f2f; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        
        /* Coluna Produtos */
        .produtos { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { background: #eee; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border-bottom: 3px solid #d32f2f; }
        .card:active { transform: scale(0.95); }
        .card b { color: #28a745; display: block; margin-top: 5px; }

        /* Coluna Comanda (Direita) */
        .comanda { width: 320px; background: white; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        .itens-comanda { flex: 1; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .total { font-size: 24px; font-weight: bold; color: #d32f2f; border-top: 2px solid #ddd; padding: 10px 0; }
        
        /* Botões de Ação */
        .btn-pagamento { border: none; padding: 12px; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 2px; font-size: 12px; }
        .pix { background: #4db6ac; } .dinheiro { background: #26a69a; } .cartao { background: #42a5f5; }
        .limpar { background: #757575; grid-column: span 3; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div><b>BOTECO 934</b><br><small>CONTROLE DE VENDAS</small></div>
        <div id="data-hora"></div>
    </div>

    <div class="main">
        <div class="produtos">
            <input type="text" placeholder="🔍 Buscar produto..." style="width:100%; padding:10px; border-radius:20px; border:1px solid #ddd; margin-bottom:20px;">
            <div class="grid">
                <div class="card" onclick="adicionarItem('Cerveja Lata', 5.00)">Cerveja Lata <b>R$ 5,00</b></div>
                <div class="card" onclick="adicionarItem('Refrigerante', 4.50)">Refri <b>R$ 4,50</b></div>
                <div class="card" onclick="adicionarItem('Dose Pitú', 3.00)">Dose Pitú <b>R$ 3,00</b></div>
                <div class="card" onclick="adicionarItem('Espetinho', 12.00)">Espetinho <b>R$ 12,00</b></div>
            </div>
        </div>

        <div class="comanda">
            <h3>🛒 Balcão</h3>
            <div class="itens-comanda" id="lista-itens"></div>
            
            <div class="total">
                TOTAL <span id="resumo-total" style="float:right;">R$ 0,00</span>
            </div>

            <div class="grid-btns">
                <button class="btn-pagamento pix" onclick="finalizarVenda('PIX')">PIX</button>
                <button class="btn-pagamento dinheiro" onclick="finalizarVenda('DINHEIRO')">DINHEIRO</button>
                <button class="btn-pagamento cartao" onclick="finalizarVenda('CARTÃO')">CARTÃO</button>
                <button class="btn-pagamento limpar" onclick="limparTudo()">LIMPAR COMANDA</button>
            </div>
        </div>
    </div>

    <script>
        // Atualiza a hora no cabeçalho
        setInterval(() => {
            document.getElementById('data-hora').innerText = new Date().toLocaleString('pt-BR');
        }, 1000);
    </script>
</body>
</html>
