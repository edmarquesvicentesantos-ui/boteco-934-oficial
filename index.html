<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTECO 934 - PDV COMPLETO + RÁDIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "COLE_SUA_CHAVE_AQUI", 
            authDomain: "boteco-934.firebaseapp.com",
            databaseURL: "https://boteco-934-default-rtdb.firebaseio.com",
            projectId: "boteco-934",
            storageBucket: "boteco-934.appspot.com",
            messagingSenderId: "107123456789",
            appId: "1:107123456789:web:id_do_app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let totalVenda = 0;
        let itensCarrinho = [];

        window.adicionarItem = function(nome, preco) {
            itensCarrinho.push({nome, preco});
            totalVenda += preco;
            document.getElementById('comanda-itens').innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px;"><span>${nome}</span> <span>R$ ${preco.toFixed(2)}</span></div>`;
            document.getElementById('resumo-total').innerText = "R$ " + totalVenda.toFixed(2);
        }

        window.finalizarVenda = function(metodo) {
            if(totalVenda === 0) { alert("Carrinho vazio!"); return; }
            const vendasRef = ref(db, 'vendas');
            set(push(vendasRef), { total: totalVenda, metodo: metodo, data: new Date().toLocaleString('pt-BR'), produtos: itensCarrinho })
            .then(() => { alert("Venda registrada!"); limparPainel(); });
        }

        window.limparPainel = function() {
            totalVenda = 0; itensCarrinho = [];
            document.getElementById('comanda-itens').innerHTML = "";
            document.getElementById('resumo-total').innerText = "R$ 0.00";
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background-color: #d32f2f; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .radio-player { display: flex; align-items: center; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 30px; gap: 10px; }
        .radio-player i { color: #ffc107; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; background-color: white; border-right: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-menu { width: 100%; border: none; padding: 12px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; }
        .btn-blue { background-color: #1976d2; } .btn-green { background-color: #388e3c; } .btn-purple { background-color: #7b1fa2; } .btn-grey { background-color: #616161; }

        .content { flex: 1; padding: 20px; overflow-y: auto; background-color: white; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .product-card { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; border-bottom: 4px solid #d32f2f; }
        .product-card b { color: #28a745; display: block; margin-top: 5px; }

        .right-bar { width: 300px; background-color: white; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        .comanda-lista { flex: 1; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .total-box { border-top: 3px solid #ddd; padding-top: 10px; margin-top: auto; }
        .total-valor { font-size: 24px; font-weight: bold; color: #d32f2f; display: flex; justify-content: space-between; margin-bottom: 15px; }
        
        .pagamento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-pag { border: none; padding: 10px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-pix { background: #4db6ac; } .btn-dinheiro { background: #26a69a; } .btn-cartao { background: #42a5f5; }
    </style>
</head>
<body>

    <div class="header">
        <div><h1 style="margin:0; font-size:22px;">BOTECO 934</h1></div>
        
        <div class="radio-player">
            <i class="fas fa-compact-disc fa-spin"></i>
            <span style="font-size: 12px; font-weight: bold;">RÁDIO ROCK</span>
            <audio controls style="height: 30px; width: 180px;">
                <source src="https://stream.itinerante.com.br/8026/stream" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>
        </div>

        <div id="relogio" style="font-size: 14px;"></div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <h3>NAVEGAÇÃO</h3>
            <button class="btn-menu btn-blue" onclick="location.href='mesas.html'"><i class="fas fa-chair"></i> MESAS</button>
            <button class="btn-menu btn-green" onclick="location.href='estoque.html'"><i class="fas fa-box"></i> ESTOQUE</button>
            <button class="btn-menu btn-purple" onclick="location.href='vendas.html'"><i class="fas fa-chart-line"></i> RELATÓRIOS</button>
            <button class="btn-menu btn-grey" onclick="location.href='precificacao.html'"><i class="fas fa-calculator"></i> PRECIFICAÇÃO</button>
        </div>

        <div class="content">
            <input type="text" placeholder="🔍 Buscar produto..." style="width:100%; padding:12px; border:2px solid #d32f2f; border-radius:25px; margin-bottom:20px; box-sizing:border-box;">
            <div class="product-grid">
                <div class="product-card" onclick="adicionarItem('Cerveja Lata', 5.00)"><span>🍺</span><h3>Cerveja Lata</h3><b>R$ 5,00</b></div>
                <div class="product-card" onclick="adicionarItem('Refrigerante', 4.50)"><span>🥤</span><h3>Refrigerante</h3><b>R$ 4,50</b></div>
                <div class="product-card" onclick="adicionarItem('Dose Pitú', 3.00)"><span>🥃</span><h3>Dose Pitú</h3><b>R$ 3,00</b></div>
                <div class="product-card" onclick="adicionarItem('Espetinho', 12.00)"><span>🍢</span><h3>Espetinho</h3><b>R$ 12,00</b></div>
            </div>
        </div>

        <div class="right-bar">
            <h3>🛒 BALCÃO</h3>
            <div class="comanda-lista" id="comanda-itens"></div>
            <div class="total-box">
                <div class="total-valor"><span>TOTAL</span> <span id="resumo-total">R$ 0.00</span></div>
                <div class="pagamento-grid">
                    <button class="btn-pag btn-pix" onclick="finalizarVenda('PIX')">PIX</button>
                    <button class="btn-pag btn-dinheiro" onclick="finalizarVenda('DINHEIRO')">DINHEIRO</button>
                    <button class="btn-pag btn-cartao" onclick="finalizarVenda('CARTÃO')">CARTÃO</button>
                    <button class="btn-pag" style="background:#bdbdbd; grid-column:span 2; color:333;" onclick="limparPainel()">LIMPAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleString('pt-BR'); }, 1000);
    </script>
</body>
</html>
