<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 - PDV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, push, update, remove } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "COLE_SUA_CHAVE_AQUI", 
            authDomain: "boteco-934.firebaseapp.com",
            databaseURL: "https://boteco-934-default-rtdb.firebaseio.com",
            projectId: "boteco-934"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let totalVenda = 0;
        let itensCarrinho = {};

        window.verificarNome = function() {
            const nome = document.getElementById('nome-cliente').value.trim();
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(c => {
                c.style.opacity = nome.length >= 3 ? "1" : "0.4";
                c.style.pointerEvents = nome.length >= 3 ? "auto" : "none";
            });
        }

        window.adicionarItem = function(nome, preco) {
            const nomeMesa = document.getElementById('nome-cliente').value.trim();
            if (!itensCarrinho[nome]) { itensCarrinho[nome] = { preco, qtd: 1 }; } 
            else { itensCarrinho[nome].qtd += 1; }
            totalVenda += preco;

            // Bloqueia a mesa no Mapa
            update(ref(db, 'mesas_ativas/' + nomeMesa), { status: "OCUPADA" });
            atualizarVisual();
        }

        function atualizarVisual() {
            const area = document.getElementById('comanda-itens');
            area.innerHTML = "";
            for (let n in itensCarrinho) {
                area.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #ddd;">
                    <span>${n} (x${itensCarrinho[n].qtd})</span>
                    <b>R$ ${(itensCarrinho[n].preco * itensCarrinho[n].qtd).toFixed(2)}</b>
                </div>`;
            }
            document.getElementById('resumo-total').innerText = "R$ " + totalVenda.toFixed(2);
        }

        window.finalizarVenda = function(metodo) {
            const nomeMesa = document.getElementById('nome-cliente').value.trim();
            if (totalVenda <= 0) return;
            push(ref(db, 'vendas'), { cliente: nomeMesa, total: totalVenda, metodo, data: new Date().toLocaleString() })
            .then(() => {
                remove(ref(db, 'mesas_ativas/' + nomeMesa)); // Libera a mesa
                alert("Venda Finalizada!");
                location.reload();
            });
        }
    </script>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 200px; background: #333; color: white; padding: 20px; }
        .main { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .product-card { border: 1px solid #ccc; padding: 20px; text-align: center; cursor: pointer; opacity: 0.4; pointer-events: none; }
        .right { width: 300px; background: #eee; padding: 20px; display: flex; flex-direction: column; }
    </style>
</head>
<body onload="verificarNome()">
    <div class="sidebar">
        <button onclick="location.href='mesas.html'" style="width:100%; padding:10px; margin-bottom:10px;">MAPA DE MESAS</button>
    </div>
    <div class="main">
        <div class="product-card" onclick="adicionarItem('Cerveja', 5.00)">Cerveja<br>R$ 5,00</div>
        <div class="product-card" onclick="adicionarItem('Refri', 4.50)">Refri<br>R$ 4,50</div>
    </div>
    <div class="right">
        <input type="text" id="nome-cliente" placeholder="Mesa 1, Mesa 2..." onkeyup="verificarNome()" style="padding:10px; margin-bottom:10px;">
        <div id="comanda-itens" style="flex:1;"></div>
        <h2 id="resumo-total">R$ 0.00</h2>
        <button onclick="finalizarVenda('PIX')" style="background:green; color:white; padding:10px;">PIX</button>
    </div>
</body>
</html>
