<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 - PDV</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // CONFIGURAÇÃO DO SEU FIREBASE (Boteco 934)
        const firebaseConfig = {
            apiKey: "AIzaSyDW-YOUR_KEY", 
            authDomain: "boteco-934.firebaseapp.com",
            databaseURL: "https://boteco-934-default-rtdb.firebaseio.com",
            projectId: "boteco-934",
            storageBucket: "boteco-934.appspot.com",
            messagingSenderId: "107123456789",
            appId: "1:107123456789:web:your_app_id"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.vender = function(produto, preco) {
            const vendasRef = ref(db, 'vendas');
            const novaVenda = push(vendasRef);
            set(novaVenda, {
                produto: produto,
                preco: preco,
                data: new Date().toLocaleString('pt-BR')
            }).then(() => {
                alert(produto + ' registrado com sucesso!');
            }).catch((error) => {
                console.error("Erro ao vender: ", error);
            });
        }
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .card:active { transform: scale(0.95); }
        .preco { color: green; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>Boteco 934 - Frente de Caixa</h1>
    <div class="grid">
        <div class="card" onclick="vender('Cerveja Lata', 5.00)">
            <h3>Cerveja Lata</h3>
            <p class="preco">R$ 5,00</p>
        </div>
        <div class="card" onclick="vender('Refrigerante', 4.50)">
            <h3>Refrigerante</h3>
            <p class="preco">R$ 4,50</p>
        </div>
        <div class="card" onclick="vender('Dose Cachaça', 3.00)">
            <h3>Dose Cachaça</h3>
            <p class="preco">R$ 3,00</p>
        </div>
    </div>
    <br>
    <a href="vendas.html" style="color: #666;">Ver Histórico de Vendas</a>
</body>
</html>
